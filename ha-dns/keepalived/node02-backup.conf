vrrp_script chk_dns {
    script "/etc/keepalived/check_dns.sh"
    interval 2
    weight -20
    fall 2
    rise 2
}

vrrp_instance VI_DNS {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 90
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass hadns123
    }

    virtual_ipaddress {
        192.168.86.40/24
    }

    track_script {
        chk_dns
    }
}
